<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss Map</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>
<body>
    <div id="map-container">
        <img id="map" src="country.svg" alt="Switzerland Map">

        <div class="droplet" data-city="zurich" style="top: 130px; left: 455px;"></div>
        <div class="city-label" data-city="zurich" style="top: 120px; left: 475px;">Zurich</div>

        <div class="droplet" data-city="geneva" style="top: 400px; left: 65px;"></div>
        <div class="city-label" data-city="geneva" style="top: 390px; left: 85px;">Geneva</div>

        <div class="droplet" data-city="basel" style="top: 90px; left: 300px;"></div>
        <div class="city-label" data-city="basel" style="top: 80px; left: 320px;">Basel</div>

        <div class="droplet" data-city="bern" style="top: 230px; left: 275px;"></div>
        <div class="city-label" data-city="bern" style="top: 220px; left: 295px;">Bern</div>

        <div class="droplet" data-city="lucerne" style="top: 200px; left: 415px;"></div>
        <div class="city-label" data-city="lucerne" style="top: 190px; left: 435px;">Lucerne</div>

        <div class="droplet" data-city="chur" style="top: 255px; left: 610px;"></div>
        <div class="city-label" data-city="chur" style="top: 245px; left: 630px;">Chur</div>

        <div class="droplet" data-city="locarno" style="top: 405px; left: 495px;"></div>
        <div class="city-label" data-city="locarno" style="top: 395px; left: 515px;">Locarno</div>

        <div class="droplet" data-city="sion" style="top: 395px; left: 260px;"></div>
        <div class="city-label" data-city="sion" style="top: 385px; left: 280px;">Sion</div>
    </div>

    <div class="controls-container">
        <div>
            <button data-city="zurich" onclick="handleEvent(event)">Show Zurich</button>
            <input type="checkbox" id="zurich" data-city="zurich" onclick="handleCheckboxEvent(event)">
            <label for="zurich">Zurich</label>
        </div>
        <div>
            <button data-city="geneva" onclick="handleEvent(event)">Show Geneva</button>
            <input type="checkbox" id="geneva" data-city="geneva" onclick="handleCheckboxEvent(event)">
            <label for="geneva">Geneva</label>
        </div>
        <div>
            <button data-city="basel" onclick="handleEvent(event)">Show Basel</button>
            <input type="checkbox" id="basel" data-city="basel" onclick="handleCheckboxEvent(event)">
            <label for="basel">Basel</label>
        </div>
        <div>
            <button data-city="bern" onclick="handleEvent(event)">Show Bern</button>
            <input type="checkbox" id="bern" data-city="bern" onclick="handleCheckboxEvent(event)">
            <label for="bern">Bern</label>
        </div>
        <div>
            <button data-city="lucerne" onclick="handleEvent(event)">Show Lucerne</button>
            <input type="checkbox" id="lucerne" data-city="lucerne" onclick="handleCheckboxEvent(event)">
            <label for="lucerne">Lucerne</label>
        </div>
        <div>
            <button data-city="chur" onclick="handleEvent(event)">Show Chur</button>
            <input type="checkbox" id="chur" data-city="chur" onclick="handleCheckboxEvent(event)">
            <label for="chur">Chur</label>
        </div>
        <div>
            <button data-city="locarno" onclick="handleEvent(event)">Show Locarno</button>
            <input type="checkbox" id="locarno" data-city="locarno" onclick="handleCheckboxEvent(event)">
            <label for="locarno">Locarno</label>
        </div>
        <div>
            <button data-city="sion" onclick="handleEvent(event)">Show Sion</button>
            <input type="checkbox" id="sion" data-city="sion" onclick="handleCheckboxEvent(event)">
            <label for="sion">Sion</label>
        </div>
    </div>
</body>
</html>
